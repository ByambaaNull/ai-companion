<!-- @dsCard group="Components" name="Cards & stats" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cards & stats · AI Companion</title>
<style>
  :root{
    --bg:#06070c;
    --bg-grad:
      radial-gradient(700px 460px at 12% -12%, rgba(124,108,255,.28), transparent 60%),
      radial-gradient(620px 460px at 104% 8%, rgba(196,98,234,.20), transparent 58%),
      radial-gradient(560px 420px at 50% 124%, rgba(56,189,248,.14), transparent 60%);
    --surface:rgba(30,33,48,.52);
    --border:rgba(255,255,255,.10);
    --text:#eceefb; --text-2:#a8b0c9; --muted:#6f7796;
    --accent:#8b8cff; --good:#4ade80; --warn:#fbbf24;
    --accent-grad:linear-gradient(135deg,#8b8cff,#c062ea);
    --blur:saturate(150%) blur(18px);
    --font:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font);color:var(--text);background:var(--bg-grad),var(--bg);
       background-attachment:fixed;min-height:100vh;padding:30px}
  h1{font-size:18px;font-weight:650;margin-bottom:18px}
  .lbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 0 12px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
  .card{backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);background:var(--surface);
        border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 16px 44px rgba(0,0,0,.5)}
  .k{display:block;color:var(--text-2);font-size:11px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px}
  .v{font-size:22px;font-weight:650;line-height:1.1}
  .s{display:block;color:var(--muted);font-size:12px;margin-top:7px}
  .quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .qbtn{display:flex;align-items:center;gap:10px;min-height:46px;border-radius:12px;
        background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);
        padding:11px 14px;font-size:13px;cursor:pointer;transition:.15s}
  .qbtn:hover{border-color:var(--accent);background:rgba(139,140,255,.10)}
  .qbtn svg{color:var(--accent);flex-shrink:0}
</style>
</head>
<body>
  <h1>Cards &amp; stats</h1>

  <div class="lbl">Stat cards</div>
  <div class="grid">
    <div class="card"><span class="k">Status</span><div class="v" style="color:var(--good)">Online</div><span class="s">Last reply 2m ago</span></div>
    <div class="card"><span class="k">Automations</span><div class="v">Enabled</div><span class="s">3 active jobs</span></div>
    <div class="card"><span class="k">AI budget</span><div class="v">142</div><span class="s">background calls left</span></div>
  </div>

  <div class="lbl">Quick commands</div>
  <div class="quick">
    <button class="qbtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M8 13h8M8 17h8"/></svg>Daily brief</button>
    <button class="qbtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-4 9 4-9 4-9-4z"/><path d="M3 7v10l9 4 9-4V7"/></svg>Downloads</button>
    <button class="qbtn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>Weekly report</button>
  </div>
</body>
</html>
